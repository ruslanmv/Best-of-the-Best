# =========================================================================
#  Best-of-the-Best navigation
#  Rendered by _includes/masthead.html (same self-contained nav used on
#  ruslanmv.com so this subsite inherits the parent-site identity).
#  - `main`   : the desktop top bar (items with `children` are dropdowns)
#  - `burger` : the full slide-out sitemap (always available, all devices)
#  - `blog`   : project sidebar nav shown on the daily blog posts
#  URLs are root-relative: the site is served under ruslanmv.com, so they
#  resolve to the parent site; project pages use the /Best-of-the-Best prefix.
# =========================================================================

main:
  - title: "About"
    url: /about/
    children:
