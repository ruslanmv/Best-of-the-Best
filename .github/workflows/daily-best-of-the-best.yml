name: "🏆 Daily Best-of-the-Best Blog"

on:
  schedule:
    - cron: "0 4 * * *"  # Every day at 04:00 UTC (05:00 CET)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  best-of-the-best:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y graphviz fonts-dejavu-core
          echo "✅ System dependencies installed (graphviz, fonts)"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt
          echo "✅ Python dependencies installed"

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          echo "✅ Playwright browser installed"

      - name: ⚙️ Install Ollama (Linux)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: 🧠 Start Ollama & pull llama3 model
        env:
          OLLAMA_HOST: "127.0.0.1"
          OLLAMA_PORT: "11434"
        run: |
          ollama serve >/tmp/ollama.log 2>&1 &
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:11434/api/tags" >/dev/null 2>&1; then
              echo "✅ Ollama is up"
              break
            fi
            echo "⏳ Waiting for Ollama..."
            sleep 2
          done
          echo "⬇️ Pulling qwen2.5:7b (best balance of quality/speed/memory)..."
          ollama pull qwen2.5:7b
          echo "✅ Model ready"

      - name: Create required directories
        run: |
          mkdir -p blog/api
          mkdir -p blog/posts
          mkdir -p data
          mkdir -p assets/images
          mkdir -p logs

      - name: 🏆 Generate daily Best-of-the-Best blog post
        env:
          # Ollama configuration
          NEWS_LLM_MODEL: "ollama/qwen2.5:7b"
          OLLAMA_HOST: "http://127.0.0.1:11434"

          # LiteLLM timeout settings (prevent long hangs, enable fast retries)
          LITELLM_REQUEST_TIMEOUT: "120"
          LITELLM_NUM_RETRIES: "2"

          # Image generation (optional - will create placeholders if not set)
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

          # Optional: other LLM providers (if you switch from Ollama)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WATSONX_APIKEY: ${{ secrets.WATSONX_APIKEY }}
          WATSONX_URL: ${{ secrets.WATSONX_URL }}
          WATSONX_PROJECT_ID: ${{ secrets.WATSONX_PROJECT_ID }}
        run: |
          echo "🚀 Starting blog generation..."
          python scripts/generate_daily_blog.py
          echo "✅ Blog generation complete"

      - name: 🖼️ Generate images for posts missing them
        run: |
          python scripts/generate_blog_images.py
          echo "✅ Blog images ensured"

      - name: 🛡️ Check for duplicate topics
        run: |
          # Get the newest post
          LATEST_POST=$(ls -t blog/posts/*.md 2>/dev/null | grep -v index | head -1)
          if [ -z "$LATEST_POST" ]; then
            echo "⚠️  No post found, skipping duplicate check"
            exit 0
          fi

          # Extract topic_id
          TOPIC_ID=$(grep "^topic_id:" "$LATEST_POST" | head -1 | sed 's/topic_id: *"\?\([^"]*\)"\?/\1/')

          # Check last 5 posts for same topic_id
          PREV_POSTS=$(ls -t blog/posts/*.md 2>/dev/null | grep -v index | tail -n +2 | head -5)
          for post in $PREV_POSTS; do
            PREV_ID=$(grep "^topic_id:" "$post" | head -1 | sed 's/topic_id: *"\?\([^"]*\)"\?/\1/')
            if [ "$PREV_ID" = "$TOPIC_ID" ]; then
              echo "❌ DUPLICATE TOPIC DETECTED: $TOPIC_ID"
              echo "   Latest: $(basename "$LATEST_POST")"
              echo "   Previous: $(basename "$post")"
              exit 1
            fi
          done

          echo "✅ No duplicate topics found (current topic: $TOPIC_ID)"

      - name: Verify blog post was created
        run: |
          echo "🔍 Verifying blog post output..."

          # Check if any new blog post exists (excluding index.md)
          LATEST_POST=$(ls -t blog/posts/*.md 2>/dev/null | grep -v index | head -1)

          if [ -z "$LATEST_POST" ]; then
            echo "❌ No blog posts found!"
            echo "   Expected format: blog/posts/YYYY-MM-DD-*.md"
            ls -la blog/posts/ || true
            exit 1
          fi

          echo "✅ Blog post found: $(basename "$LATEST_POST")"

          # Validate Jekyll front matter
          if ! head -1 "$LATEST_POST" | grep -q "^---$"; then
            echo "❌ Invalid Jekyll front matter"
            head -5 "$LATEST_POST"
            exit 1
          fi

          # Check word count
          WORD_COUNT=$(grep -v "^---" "$LATEST_POST" | wc -w | xargs)
          echo "   Words: $WORD_COUNT"

          if [ "$WORD_COUNT" -lt 100 ]; then
            echo "❌ Post too short: $WORD_COUNT words"
            exit 1
          fi

          if [ "$WORD_COUNT" -lt 800 ]; then
            echo "⚠️  Warning: Post seems short (< 800 words, has $WORD_COUNT)"
          fi

          # Check for code blocks
          CODE_BLOCKS=$(grep -c '```python' "$LATEST_POST" || echo "0")
          echo "   Code blocks: $CODE_BLOCKS"

          echo ""
          echo "🖼️  Checking generated assets..."

          # Check for topic-specific images
          if ls assets/images/20*/header-*.jpg 1> /dev/null 2>&1; then
            NEW_IMAGES=$(find assets/images/20*/ -type f 2>/dev/null | wc -l)
            echo "✅ $NEW_IMAGES topic-specific images found"
          else
            echo "⚠️  No topic-specific images found (placeholders may be used)"
          fi

          echo ""
          echo "✅ Post validation passed"

      - name: 🔁 Rebuild blog index & API feeds
        run: |
          python blog/generate_index.py
          python export_data_feeds.py

      - name: 📊 Quality report & coverage check
        run: |
          echo "📊 Quality report..."

          LATEST_POST=$(ls -t blog/posts/*.md 2>/dev/null | grep -v index | head -1)

          if [ -n "$LATEST_POST" ]; then
            ISSUES=0

            if ! grep -q '```python' "$LATEST_POST"; then
              echo "⚠️  No code examples found"
              ISSUES=$((ISSUES + 1))
            fi

            if grep -qi "rapidly evolving" "$LATEST_POST"; then
              echo "⚠️  AI buzzwords detected"
              ISSUES=$((ISSUES + 1))
            fi

            WORD_COUNT=$(grep -v "^---" "$LATEST_POST" | wc -w | xargs)
            if [ "$WORD_COUNT" -lt 500 ]; then
              echo "⚠️  Short post (< 500 words)"
              ISSUES=$((ISSUES + 1))
            fi

            if [ "$ISSUES" -eq 0 ]; then
              echo "✅ No quality issues detected"
            fi
          fi

          # Coverage stats
          if [ -f "data/blog_coverage.json" ]; then
            COVERAGE_COUNT=$(python -c "import json; print(len(json.load(open('data/blog_coverage.json'))))" 2>/dev/null || echo "?")
            echo ""
            echo "📈 Coverage Stats:"
            echo "   Total posts: $COVERAGE_COUNT"
          fi

          echo "✅ Quality check complete"

      - name: Commit new blog + assets + updated feeds
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 Daily update: blog post + README tables - ${{ github.event.repository.updated_at || 'today' }}"
          file_pattern: |
            blog/posts/*.md
            blog/posts/index.json
            blog/api/*.json
            blog/api/*.xml
            data/blog_coverage.json*
            assets/images/**/*.jpg
            assets/images/**/*.png
          commit_user_name: "BestOfTheBestBot"
          commit_user_email: "actions@github.com"
          commit_options: '--no-verify'

      # -----------------------------------------------------------
      # Jekyll Build & GitHub Pages Deploy
      # -----------------------------------------------------------
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Jekyll dependencies
        run: |
          bundle install --jobs 4 --retry 3

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build --baseurl "/Best-of-the-Best"
          touch ./_site/.nojekyll
          echo "✅ Jekyll site built successfully"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: blog-generation-logs
          path: |
            logs/blog_generation.log
            /tmp/ollama.log
          retention-days: 7
