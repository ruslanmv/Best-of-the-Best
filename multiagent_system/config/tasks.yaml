research_task:
  description: |
    Analyze the current data in the repository to identify today's most trending AI package.
    Look at:
    1. Recent download trends from PyPI statistics
    2. GitHub star growth rates
    3. Community discussions and adoption signals
    4. Technical innovation and unique features

    Select ONE package that shows the most promise and interest today.
    Provide detailed information about:
    - Package name and purpose
    - Key features and capabilities
    - Current popularity metrics (downloads, stars)
    - Main use cases
    - Technical requirements

  expected_output: |
    A comprehensive research report containing:
    - Selected package name
    - Detailed description of the package
    - Popularity metrics and trends
    - Key features and capabilities
    - Main use cases and applications
    - Installation and basic usage information

analysis_task:
  description: |
    Based on the researched package, conduct a deep analysis focusing on:

    1. **Technical Analysis:**
       - Core architecture and design patterns
       - Key API surface and main classes/functions
       - Integration points with other popular libraries
       - Performance characteristics and scalability

    2. **Ecosystem Fit:**
       - How does this package fit in the AI/ML ecosystem?
       - What problems does it solve that alternatives don't?
       - Compatibility with popular frameworks (PyTorch, TensorFlow, etc.)

    3. **Practical Value:**
       - Real-world use cases with concrete examples
       - Time-to-value for developers adopting this tool
       - Enterprise readiness and production considerations

    Provide concrete examples and implementation strategies.

  expected_output: |
    A detailed analysis report containing:
    - Executive summary of the package's value
    - Technical architecture overview
    - At least 3 practical use case scenarios
    - Integration recommendations
    - Recommended next steps for adoption

writing_task:
  description: |
    Create an engaging, well-structured blog post about today's featured AI package.

    CRITICAL RULES FOR CODE EXAMPLES:
    - Use ONLY real, documented API calls from the package's official documentation.
    - Do NOT invent classes, methods, or functions that don't exist in the library.
    - Each code block must be complete with all imports and variable definitions.
    - No placeholders (TODO, ..., your_X, pass). Environment variables for credentials are allowed.
    - If unsure about an API, use a simple, minimal example rather than an elaborate fake one.
    - NEVER write the character sequences "{{" or "{%" anywhere (the post is processed
      by Liquid/Jekyll and they break the build).

    ORIGINALITY RULES (every post must read as original analysis, not a template):
    - Take clear positions: say when the package is the right choice AND when it is not.
    - Include an honest assessment of project health (release cadence, maintenance
      activity, production readiness) — praise and criticism where deserved.
    - Compare against real alternatives a practitioner would actually consider.
    - The title must answer: what is this, who needs it, and why should they click?
      (e.g. "BERTScore for LLM Evaluation: When to Use It, Examples, and
      Alternatives" — never just the package name.)
    - Stay vendor-neutral. Do not frame the post around any single commercial
      platform; name a specific vendor only when the integration is genuinely
      true and useful to the reader.

    The blog post should follow this structure:

    1. **Why <package> matters:**
       - What problem it solves and why it matters in the current AI landscape
       - 2-3 original paragraphs, not a feature list

    2. **Quick start:**
       - Installation plus ONE complete, minimal working example

    3. **Type-specific deep dive** (pick the variant matching the package type):
       - Evaluation packages: metrics supported, example evaluation workflow,
         comparison with RAGAS / DeepEval / classic metrics
       - Agent frameworks: agent architecture, tool calling, memory,
         human-in-the-loop, production readiness
       - Data/vector packages: storage model, query patterns, scale limits,
         integration examples
       - Visualization packages: chart/map types, notebook support, dashboards,
         export formats
       - Models/runtimes: architecture, hardware requirements, serving options
       - Anything else: the 3-4 API surfaces or workflows users actually need

    4. **When to use it** — concrete scenarios where it is the right tool.

    5. **When not to use it** — concrete scenarios where an alternative wins.

    6. **Integration and production notes:**
       - How the package fits into a real production stack (mostly prose; at
         most one minimal code sketch with credentials only via environment
         variables). Stay vendor-neutral — do NOT center the post on any single
         commercial platform. Mention a specific vendor only when the
         integration is genuinely true and load-bearing, never as filler.

    7. **Alternatives compared:**
       - A Markdown table comparing 3-5 real alternatives (columns such as
         "best for", "maintenance", "ecosystem"), followed by 2-3 paragraphs
         of honest opinion

    8. **Limitations** — real drawbacks, not soft caveats.

    9. **Final recommendation** — a clear opinion: who should adopt it,
       as part of what stack.

    10. **References** — real links only (GitHub, official docs, paper, PyPI).

    Format the post in Markdown with proper headings (## and ###), code blocks, and links.
    Target length: 1400-2000 words.
    Do NOT include any meta-commentary, preambles, or notes about being an AI.

  expected_output: |
    A complete blog post in Markdown format with:
    - A title that answers "what is this, who needs it, why click" (never just the package name)
    - An original "why it matters" opening (no boilerplate)
    - A type-specific deep dive, "when to use it" and "when not to use it" sections
    - A vendor-neutral "integration and production notes" section
    - An alternatives comparison table with honest opinion
    - Limitations and a clear final recommendation
    - Complete, working code examples using real APIs (no "{{" or "{%" sequences)
    - References with real links
