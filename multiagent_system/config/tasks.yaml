research_task:
  description: |
    Analyze the current data in the repository to identify today's most trending AI package.
    Look at:
    1. Recent download trends from PyPI statistics
    2. GitHub star growth rates
    3. Community discussions and adoption signals
    4. Technical innovation and unique features

    Select ONE package that shows the most promise and interest today.
    Provide detailed information about:
    - Package name and purpose
    - Key features and capabilities
    - Current popularity metrics (downloads, stars)
    - Main use cases
    - Technical requirements

  expected_output: |
    A comprehensive research report containing:
    - Selected package name
    - Detailed description of the package
    - Popularity metrics and trends
    - Key features and capabilities
    - Main use cases and applications
    - Installation and basic usage information

analysis_task:
  description: |
    Based on the researched package, conduct a deep analysis focusing on:

    1. **Technical Analysis:**
       - Core architecture and design patterns
       - Key API surface and main classes/functions
       - Integration points with other popular libraries
       - Performance characteristics and scalability

    2. **Ecosystem Fit:**
       - How does this package fit in the AI/ML ecosystem?
       - What problems does it solve that alternatives don't?
       - Compatibility with popular frameworks (PyTorch, TensorFlow, etc.)

    3. **Practical Value:**
       - Real-world use cases with concrete examples
       - Time-to-value for developers adopting this tool
       - Enterprise readiness and production considerations

    Provide concrete examples and implementation strategies.

  expected_output: |
    A detailed analysis report containing:
    - Executive summary of the package's value
    - Technical architecture overview
    - At least 3 practical use case scenarios
    - Integration recommendations
    - Recommended next steps for adoption

writing_task:
  description: |
    Create an engaging, well-structured blog post about today's featured AI package.

    CRITICAL RULES FOR CODE EXAMPLES:
    - Use ONLY real, documented API calls from the package's official documentation.
    - Do NOT invent classes, methods, or functions that don't exist in the library.
    - Each code block must be complete with all imports and variable definitions.
    - No placeholders (TODO, ..., your_X, pass).
    - If unsure about an API, use a simple, minimal example rather than an elaborate fake one.

    The blog post should follow this structure:

    1. **Introduction:**
       - What the package is and what problem it solves
       - Why it matters in the current AI landscape

    2. **Overview:**
       - Key features and capabilities
       - Current version and maintenance status
       - Primary use cases

    3. **Getting Started:**
       - Installation instructions
       - Quick start with a complete, working code example

    4. **Core Concepts:**
       - Main API surface and how it works
       - Example usage with real API calls

    5. **Practical Examples:**
       - Example 1: A specific, realistic use case with complete code
       - Example 2: Another use case with complete code

    6. **Best Practices:**
       - Tips for effective usage
       - Common pitfalls to avoid

    7. **Conclusion:**
       - Summary of key takeaways
       - Links to official documentation

    Format the post in Markdown with proper headings (## and ###), code blocks, and links.
    Target length: 1000-1500 words.
    Do NOT include any meta-commentary, preambles, or notes about being an AI.

  expected_output: |
    A complete blog post in Markdown format with:
    - Professional title
    - Engaging introduction
    - Well-structured sections with ## and ### headings
    - Complete, working code examples using real APIs
    - Links to relevant resources
    - Conclusion with next steps
